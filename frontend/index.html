<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <meta name="archive.org" content="noindex" />
    <meta name="googlebot" content="noindex, nofollow" />
    <title>Journal Intelligence</title>

    <!-- PWA -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6366f1" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Journal" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />

    <!-- Splash / description -->
    <meta name="description" content="Your personal AI-powered journal intelligence dashboard" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,500&family=Playfair+Display:ital,wght@0,700;1,400;1,600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --bg-base:       #07070f;
        --bg-surface:    #0c0c18;
        --bg-card:       #10101e;
        --bg-card-hover: #14142a;
        --border:        rgba(99,102,241,0.12);
        --border-bright: rgba(99,102,241,0.3);
        --accent:        #6366f1;
        --accent-2:      #8b5cf6;
        --accent-glow:   rgba(99,102,241,0.2);
        --text-primary:  #e8e8f0;
        --text-secondary:#9898b0;
        --text-muted:    #55556a;
        --bg-card-alt:   #13131f;
        --bg-card-dark:  #0d0d1a;
        --bg-card-deep:  #0d1117;
        --bg-progress:   #1e293b;
        --bg-sidebar:    rgba(7,7,15,0.97);
        --mood-photo:    none;
        --mood-name:     'neutral';
        --mood-hue:      240;
        --severity-color:#f59e0b;
      }
      * { box-sizing: border-box; margin: 0; padding: 0; }
      [data-ui-theme="writer"] body {
        font-family: 'Cormorant Garamond', Georgia, serif !important;
      }
      [data-ui-theme="writer"] ::-webkit-scrollbar-thumb {
        background: rgba(195,145,85,0.3);
      }
      body {
        background: var(--bg-base);
        color: var(--text-primary);
        font-family: 'DM Sans', sans-serif;
        min-height: 100vh;
        /* Safe area insets for iPhone notch / home indicator */
        padding-top: env(safe-area-inset-top);
        padding-bottom: env(safe-area-inset-bottom);
        padding-left: env(safe-area-inset-left);
        padding-right: env(safe-area-inset-right);
        overflow-x: hidden;
      }
      #root { display: flex; height: 100vh; overflow: hidden; }
      ::-webkit-scrollbar { width: 4px; }
      ::-webkit-scrollbar-track { background: transparent; }
      ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 2px; }

      /* ── Mobile safe-area & global fixes ─────────────────────────────── */
      @supports (padding-top: env(safe-area-inset-top)) {
        body {
          padding-top: env(safe-area-inset-top);
          padding-bottom: env(safe-area-inset-bottom);
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }

      /* Prevent horizontal overflow on every page */
      html { overflow-x: hidden; }
      body { overflow-x: hidden; max-width: 100vw; }

      /* Use dynamic viewport height so address-bar shrink is handled */
      #root {
        display: flex;
        height: 100vh;
        height: 100dvh;
        overflow: hidden;
      }

      @media (max-width: 767px) {
        /* Prevent iOS zoom on ANY input — must be >= 16px to suppress it */
        input:not([type="range"]),
        select,
        textarea {
          font-size: 16px !important;
        }

        /* Recharts / canvas overflow guard */
        .recharts-wrapper,
        .recharts-surface,
        canvas {
          max-width: 100% !important;
        }

        /* Card/table overflow guard */
        table { display: block; overflow-x: auto; -webkit-overflow-scrolling: touch; }

        /* Minimum touch target size */
        button, [role="button"] { min-height: 44px; }

        /* Scrollable content areas shouldn't clip */
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[PWA] SW registered:', reg.scope))
            .catch(err => console.warn('[PWA] SW registration failed:', err));
        });
      }
    </script>
  </body>
</html>
